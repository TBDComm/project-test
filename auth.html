<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 / 회원가입 — MOMENTO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/theme-init.js"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

<main class="auth-page" id="main-content">
  <div class="auth-box">
    <a href="/index.html" class="auth-logo">
      <span class="logo-icon">M</span>
      MOMENTO
    </a>

    <!-- 로그인 폼 -->
    <div id="login-panel">
      <h2 class="auth-title">다시 오셨군요</h2>
      <p class="auth-sub">이메일 또는 구글 계정으로 로그인하세요.</p>

      <div class="auth-form">
        <button class="btn-google" id="google-login-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google 계정으로 로그인
        </button>

        <div class="auth-divider">
          <span class="auth-divider-text">또는 이메일로 로그인</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-email">이메일</label>
          <input type="email" id="login-email" name="email" class="form-input" placeholder="example@gmail.com" autocomplete="email" spellcheck="false" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">비밀번호</label>
          <input type="password" id="login-password" name="password" class="form-input" placeholder="비밀번호 입력…" autocomplete="current-password" />
        </div>

        <div id="login-error" class="auth-error hidden"></div>

        <button class="btn btn-primary btn-full" id="email-login-btn" style="padding: 13px;">
          로그인
        </button>
      </div>

      <p class="auth-switch">
        아직 계정이 없으신가요?
        <a href="#" id="to-signup">회원가입하기</a>
      </p>
    </div>

    <!-- 회원가입 폼 -->
    <div id="signup-panel" class="hidden">
      <h2 class="auth-title">MOMENTO 시작하기</h2>
      <p class="auth-sub">무료로 시작하세요. 신용카드가 필요하지 않습니다.</p>

      <div class="auth-form">
        <button class="btn-google" id="google-signup-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google 계정으로 가입
        </button>

        <div class="auth-divider">
          <span class="auth-divider-text">또는 이메일로 가입</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-email">이메일</label>
          <input type="email" id="signup-email" name="email" class="form-input" placeholder="example@gmail.com" autocomplete="email" spellcheck="false" />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">비밀번호</label>
          <input type="password" id="signup-password" name="password" class="form-input" placeholder="8자 이상 입력…" autocomplete="new-password" />
          <span class="form-hint">영문, 숫자 포함 8자 이상</span>
        </div>

        <div id="signup-error" class="auth-error hidden"></div>

        <button class="btn btn-primary btn-full" id="email-signup-btn" style="padding: 13px;">
          무료로 시작하기
        </button>

        <p style="font-size: 12px; color: var(--text-3); text-align: center; line-height: 1.6;">
          가입하면 <a href="#" style="color: var(--text-2);">이용약관</a>과
          <a href="#" style="color: var(--text-2);">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.
        </p>
      </div>

      <p class="auth-switch">
        이미 계정이 있으신가요?
        <a href="#" id="to-login">로그인하기</a>
      </p>
    </div>
  </div>
</main>

<script type="module" src="/auth.js"></script>
</body>
</html>
