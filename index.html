<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube AI Video Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body class="theme-light">
  <header class="app-header">
    <div class="header-container">
      <div class="logo">
        <span class="icon">🎬</span>
        <h1>AI Video Analyzer</h1>
      </div>
      <div class="nav-actions">
        <button id="partnership-btn" class="secondary-btn">🤝 제휴 문의</button>
      </div>
    </div>
  </header>

  <main class="main-container">
    <!-- Hero / Input Section -->
    <section class="hero-section">
      <div class="hero-content">
        <h2>영상을 분석하고 통찰을 얻으세요</h2>
        <p>YouTube 링크를 입력하면 AI가 내용을 요약하고 감성 및 참여도를 분석합니다.</p>
        <div class="search-box">
          <input type="text" id="youtube-url" placeholder="YouTube 영상 URL을 입력하세요 (예: https://www.youtube.com/watch?v=...)">
          <button id="analyze-btn">분석 시작</button>
        </div>
      </div>
    </section>

    <!-- Analysis Dashboard -->
    <section id="analysis-dashboard" class="dashboard-grid hidden">
      <div class="video-preview-card card">
        <div class="card-header">영상 미리보기</div>
        <div id="video-embed" class="embed-container"></div>
        <h3 id="video-title">분석을 위해 링크를 입력해주세요</h3>
      </div>

      <div class="metrics-card card">
        <div class="card-header">주요 통계</div>
        <div class="metrics-grid">
          <div class="metric-item">
            <span class="label">감성 점수</span>
            <span class="value" id="sentiment-score">--</span>
          </div>
          <div class="metric-item">
            <span class="label">참여 지수</span>
            <span class="value" id="engagement-index">--</span>
          </div>
        </div>
      </div>

      <div class="summary-card card">
        <div class="card-header">AI 3줄 요약</div>
        <ul id="ai-summary" class="summary-list">
          <li>영상을 분석 중입니다...</li>
        </ul>
      </div>

      <div class="keywords-card card">
        <div class="card-header">핵심 키워드</div>
        <div id="keyword-cloud" class="keyword-tags"></div>
      </div>
    </section>

    <!-- Community Section (Disqus) -->
    <section class="community-section card">
      <div class="card-header">커뮤니티 토론</div>
      <div id="disqus_thread"></div>
    </section>
  </main>

  <!-- Partnership Inquiry Modal -->
  <dialog id="partnership-modal" class="premium-modal">
    <div class="modal-content">
      <header class="modal-header">
        <h2>🤝 제휴 문의하기</h2>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </header>
      <form action="https://formspree.io/f/xlgpezwr" method="POST" id="partnership-form">
        <div class="form-group">
          <label for="name">성함</label>
          <input type="text" id="name" name="name" required placeholder="홍길동">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" required placeholder="example@domain.com">
        </div>
        <div class="form-group">
          <label for="company">업체명/소속</label>
          <input type="text" id="company" name="company" required placeholder="비즈니스 파트너">
        </div>
        <div class="form-group">
          <label for="inquiry-type">문의 유형</label>
          <select id="inquiry-type" name="inquiry_type">
            <option value="partnership">비즈니스 제휴</option>
            <option value="marketing">마케팅/홍보</option>
            <option value="technical">기술 연동</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" required placeholder="협업 아이디어를 자유롭게 들려주세요."></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>
  </dialog>

  <!-- Disqus Script Integration -->
  <script>
    var disqus_config = function () {
      this.page.url = window.location.origin; // Dynamically set to current origin
      this.page.identifier = 'youtube-ai-analyzer-home'; // Unique identifier for this page
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://test-50tbhkdivl.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

  <script defer type="module" src="/main.js"></script>
</body>
</html>
